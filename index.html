<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SrRaid TVULTRA | Elite Streaming</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <div class="brand">SrRaid <span>TVULTRA</span></div>
        <nav>
            <button class="nav-btn active" data-target="tv-section">
                <i class="fas fa-tv"></i> TV EN VIVO
            </button>
            <button class="nav-btn" data-target="anime-section">
                <i class="fas fa-dragon"></i> ANIME
            </button>
            <button class="nav-btn" data-target="cine-section">
                <i class="fas fa-film"></i> CINE & SERIES
            </button>
        </nav>
    </header>

    <main class="player-container">
        <div class="player-wrapper">
            <video id="hls-player" controls autoplay playsinline></video>
            <iframe id="media-iframe" style="display:none" allowfullscreen 
                sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation">
            </iframe>
        </div>

        <div id="srv-list">
            </div>
    </main>

    <div class="search-wrapper">
        <input type="text" id="global-search" class="search-input" placeholder="Escribe el nombre y pulsa ENTER...">
    </div>

    <section id="tv-section" class="content-tab active">
        <h2 class="section-title">Canales de Chile & Deportes</h2>
        <div id="grid-tv" class="grid-container"></div>
    </section>

    <section id="anime-section" class="content-tab">
        <h2 class="section-title">Resultados de Anime</h2>
        <div id="grid-anime" class="grid-container"></div>
    </section>

    <section id="cine-section" class="content-tab">
        <h2 class="section-title">Películas y Estrenos</h2>
        <div id="grid-cine" class="grid-container"></div>
    </section>

    <script src="servers.js"></script>
    <script src="script.js"></script>

</body>
</html>
