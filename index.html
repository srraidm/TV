<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SrRaid TVGHOST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <div class="brand">SrRaid <span>TVGHOST</span></div>
        <nav>
            <button class="nav-btn active" data-target="tv-section"><i class="fas fa-satellite-dish"></i> TV VIVO</button>
            <button class="nav-btn" data-target="anime-section"><i class="fas fa-mask"></i> ANIME</button>
            <button class="nav-btn" data-target="cine-section"><i class="fas fa-film"></i> CINE</button>
        </nav>
    </header>

    <main class="main-content">
        <div class="player-container">
            <div class="player-wrapper" id="ghost-frame">
                <video id="hls-player" controls autoplay poster="https://wallpaperaccess.com/full/1567831.jpg"></video>
                
                <iframe id="media-iframe" 
                        style="display:none;" 
                        allowfullscreen 
                        referrerpolicy="no-referrer" 
                        sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation">
                </iframe>
            </div>
            
            <div id="srv-list"></div>

            <div id="anime-controls" class="ep-nav" style="display:none; justify-content: center; align-items: center; gap: 20px; margin-top: 15px;">
                <button class="nav-btn" onclick="changeEp(-1)"><i class="fas fa-chevron-left"></i> ANTERIOR</button>
                <span id="ep-indicator" style="font-family: 'Orbitron'; color: var(--primary); font-weight: bold;">GHOST EP: 1</span>
                <button class="nav-btn" onclick="changeEp(1)">SIGUIENTE <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="search-area">
            <div class="search-wrapper">
                <input type="text" id="global-search" class="search-input" placeholder="BUSCAR CANAL, ANIME O PELÍCULA (ENTER)...">
            </div>
        </div>

        <section id="tv-section" class="content-tab active">
            <div class="tv-filters">
                <button class="filter-btn active" onclick="filterTV('all')">Todos</button>
                <button class="filter-btn" onclick="filterTV('deportes')">Deportes</button>
                <button class="filter-btn" onclick="filterTV('chile')">Chile</button>
                <button class="filter-btn" onclick="filterTV('mexico')">México</button>
                <button class="filter-btn" onclick="filterTV('argentina')">Argentina</button>
                <button class="filter-btn" onclick="filterTV('latam')">Latam</button>
                <button class="filter-btn" onclick="filterTV('españa')">España</button>
                <button class="filter-btn" onclick="filterTV('cine24')">Cine 24/7</button>
                <button class="filter-btn" onclick="filterTV('niños')">Niños</button>
                <button class="filter-btn" onclick="filterTV('musica')">Música</button>
                <button class="filter-btn" onclick="filterTV('cultura')">Cultura</button>
                <button class="filter-btn" onclick="filterTV('noticias')">Noticias</button>
            </div>
            <div id="grid-tv" class="grid-container"></div>
        </section>

        <section id="anime-section" class="content-tab">
            <div id="grid-anime" class="grid-container"></div>
        </section>

        <section id="cine-section" class="content-tab">
            <div id="grid-cine" class="grid-container"></div>
        </section>

        <section id="details-view" class="content-tab">
            <div class="details-card">
                <button onclick="backToGrid()" class="nav-btn" style="margin-bottom: 30px;">
                    <i class="fas fa-undo"></i> VOLVER AL LISTADO
                </button>
                
                <div class="details-flex">
                    <img id="detail-img" src="" alt="Poster">
                    <div class="detail-info">
                        <h1 id="detail-title">Cargando...</h1>
                        <p id="detail-desc"></p>
                    </div>
                </div>

                <div style="margin-top: 40px; border-top: 1px solid #222; padding-top: 20px;">
                    <h3 style="font-family: 'Orbitron'; letter-spacing: 2px; margin-bottom: 20px;">
                        <i class="fas fa-list-ol" style="color: var(--primary);"></i> SELECCIONAR EPISODIO
                    </h3>
                    <div id="episode-grid"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="servers.js"></script>
    <script src="script.js"></script>
</body>
</html>
