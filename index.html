<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SrRaid TV, Anime & Peliculas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4757;
            --anime: #00d2ff;
            --cine: #f1c40f;
            --bg: #050505;
            --card: #111;
            --text: #ffffff;
            --border: #222;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }

        header {
            background: #000; 
            padding: 20px; 
            border-bottom: 3px solid var(--primary);
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .brand { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.2rem; 
            letter-spacing: 3px; 
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }
        .brand span { color: var(--primary); }

        nav { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-top: 15px; 
            flex-wrap: wrap; 
        }
        
        .nav-btn {
            padding: 12px 22px; 
            background: #151515; 
            border: 1px solid #333; 
            color: white;
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .nav-btn.active[onclick*="tv"] { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .nav-btn.active[onclick*="anime"] { background: var(--anime); border-color: var(--anime); box-shadow: 0 0 15px var(--anime); }
        .nav-btn.active[onclick*="cine"] { background: var(--cine); border-color: var(--cine); color: #000; box-shadow: 0 0 15px var(--cine); }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }

        .player-viewport {
            width: 100%; 
            background: #000; 
            aspect-ratio: 16/9; 
            border-radius: 12px;
            overflow: hidden; 
            border: 2px solid var(--border); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            position: relative;
        }
        
        iframe, video { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }

        .controls-panel {
            background: #0d0d0d; 
            padding: 20px; 
            display: none; 
            flex-direction: column;
            gap: 15px; 
            border: 1px solid var(--border); 
            border-top: none; 
            border-radius: 0 0 12px 12px;
        }
        .controls-panel.active { display: flex; }

        .ctrl-group { text-align: center; }
        .ctrl-label { 
            font-size: 0.65rem; 
            font-weight: 900; 
            color: #555; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        
        .btn-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        
        .btn-opt {
            padding: 8px 14px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: white;
            cursor: pointer; 
            font-size: 0.7rem; 
            font-weight: bold; 
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn-opt:hover { background: #222; }
        .btn-opt.active { background: #fff; color: #000; border-color: #fff; }
        .btn-opt.lang { border-color: var(--cine); color: var(--cine); }
        .btn-opt.lang.active { background: var(--cine); color: #000; }

        /* --- SECCIONES --- */
        .section { display: none; padding-top: 30px; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .cat-title {
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.1rem; 
            margin: 40px 0 20px;
            border-left: 5px solid var(--primary); 
            padding-left: 15px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            color: #eee;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: var(--card); 
            padding: 30px 15px; 
            border-radius: 10px; 
            text-align: center; 
            cursor: pointer; 
            border: 1px solid #222; 
            transition: 0.3s;
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--primary); 
            background: #151515;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .card i { font-size: 2.5rem; margin-bottom: 15px; display: block; color: var(--primary); }
        .card span { font-weight: 800; font-size: 0.85rem; letter-spacing: 0.5px; }

        .poster-card { padding: 0; overflow: hidden; position: relative; border: 1px solid #333; }
        .poster-card img { width: 100%; height: 260px; object-fit: cover; display: block; transition: 0.5s; }
        .poster-card:hover img { transform: scale(1.08); }
        .poster-info { 
            padding: 12px; 
            font-size: 0.8rem; 
            font-weight: 800; 
            background: rgba(0,0,0,0.9); 
            height: 55px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
        }

        .search-bar {
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto 30px; 
            display: block;
            padding: 16px 25px; 
            border-radius: 40px; 
            background: #111; 
            color: white; 
            border: 2px solid #333;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--anime); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<header>
    <div class="brand">SrRaid <span>TVULTRA</span></div>
    <nav>
        <button class="nav-btn active" onclick="tab('tv', this)">TV & DEPORTES</button>
        <button class="nav-btn" onclick="tab('anime', this)">ANIME</button>
        <button class="nav-btn" onclick="tab('cine', this)">CINE & PELICULAS</button>
    </nav>
</header>

<div class="container">
    <div class="player-viewport" id="viewport">
        <video id="hls-player" controls autoplay poster="https://wallpaperaccess.com/full/1567831.jpg"></video>
        <iframe id="embed-iframe" style="display:none" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="controls-panel" id="ctrl-panel">
        <div id="cine-lang-box" style="display:none" class="ctrl-group">
            <div class="ctrl-label">Idioma Preferido</div>
            <div class="btn-row">
                <button class="btn-opt lang active" onclick="setLang('lat', this)">Latino</button>
                <button class="btn-opt lang" onclick="setLang('sub', this)">Subtitulado</button>
                <button class="btn-opt lang" onclick="setLang('es', this)">Castellano</button>
                <button class="btn-opt lang" onclick="setLang('en', this)">English</button>
            </div>
        </div>
        
        <div class="ctrl-group" style="margin-top:10px">
            <div class="ctrl-label">Cambiar Servidor (Si falla uno, elige otro)</div>
            <div class="btn-row" id="srv-list"></div>
        </div>

        <div id="anime-nav" style="display:none" class="ctrl-group">
            <div class="nav-controls" style="display:flex; justify-content: space-between; align-items: center; margin-top:15px; border-top: 1px solid #222; padding-top: 15px;">
                <button class="btn-opt" onclick="chEp(-1)"><i class="fas fa-chevron-left"></i> EP. ANTERIOR</button>
                <span id="ep-display" style="color:var(--anime); font-weight:900; font-family:'Orbitron'; font-size: 1rem;">EPISODIO 1</span>
                <button class="btn-opt" onclick="chEp(1)">SIGUIENTE EP. <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <div id="tv-section" class="section active">
        <div class="cat-title"><i class="fas fa-futbol"></i> DEPORTES PREMIUM</div>
        <div class="grid" id="grid-dep"></div>
        
        <div class="cat-title"><i class="fas fa-tv"></i> CANALES DE CHILE</div>
        <div class="grid" id="grid-chi"></div>

        <div class="cat-title"><i class="fas fa-broadcast-tower"></i> CABLE & MUNDO</div>
        <div class="grid" id="grid-cab"></div>

        <div class="cat-title"><i class="fas fa-newspaper"></i> NOTICIAS 24/7</div>
        <div class="grid" id="grid-not"></div>
    </div>

    <div id="anime-section" class="section">
        <input type="text" class="search-bar" id="a-search" placeholder="Buscar Anime (Ej: Attack on Titan, Kimetsu...)" onkeyup="if(event.key==='Enter') searchA()">
        <div class="grid" id="grid-anime"></div>
    </div>

    <div id="cine-section" class="section">
        <input type="text" class="search-bar" id="c-search" placeholder="Buscar Película en cualquier idioma..." onkeyup="if(event.key==='Enter') searchC()">
        <div class="grid" id="grid-cine"></div>
    </div>
</div>

<footer>
    SRRAID TVULTRA &copy; 2026 - ELITE STREAMING HUB<br>
    Desarrollado para la máxima compatibilidad en GitHub Pages.
</footer>

<script>
    const tvData = {
        dep: [
            {n:"TNT Sports HD", u:"https://rudo.video/live/tntsports?ext=m3u8", i:"fa-futbol"},
            {n:"CDO Premium", u:"https://rudo.video/live/cdo?ext=m3u8", i:"fa-medal"},
            {n:"Zapping Sports", u:"https://rudo.video/live/zappingsports?ext=m3u8", i:"fa-bolt"},
            {n:"Teletrak HD", u:"https://rudo.video/live/teletrak?ext=m3u8", i:"fa-horse-head"},
            {n:"Fox Sports 1", u:"https://rudo.video/live/foxsports1?ext=m3u8", i:"fa-running"}
        ],
        chi: [
            {n:"Canal 13 HD", u:"https://rudo.video/live/c13?ext=m3u8", i:"fa-tv"},
            {n:"Mega HD", u:"https://rudo.video/live/megatv?ext=m3u8", i:"fa-tv"},
            {n:"Chilevisión", u:"https://rudo.video/live/chv?ext=m3u8", i:"fa-tv"},
            {n:"TVN HD", u:"https://rudo.video/live/tvn?ext=m3u8", i:"fa-tv"},
            {n:"La Red", u:"https://rudo.video/live/lared?ext=m3u8", i:"fa-tv"},
            {n:"TV Mas", u:"https://rudo.video/live/tvmas?ext=m3u8", i:"fa-tv"}
        ],
        cab: [
            {n:"Disney Channel", u:"https://rudo.video/live/disney?ext=m3u8", i:"fa-mickey-mouse"},
            {n:"Discovery Channel", u:"https://rudo.video/live/discovery?ext=m3u8", i:"fa-earth-americas"},
            {n:"Space", u:"https://rudo.video/live/space?ext=m3u8", i:"fa-rocket"},
            {n:"Cinecanal", u:"https://rudo.video/live/cinecanal?ext=m3u8", i:"fa-film"},
            {n:"Warner TV", u:"https://rudo.video/live/warner?ext=m3u8", i:"fa-clapperboard"}
        ],
        not: [
            {n:"T13 En Vivo", u:"https://rudo.video/live/t13?ext=m3u8", i:"fa-newspaper"},
            {n:"24 Horas News", u:"https://rudo.video/live/24horas?ext=m3u8", i:"fa-clock"},
            {n:"Meganoticias", u:"https://rudo.video/live/mnoticias?ext=m3u8", i:"fa-bolt-lightning"},
            {n:"CNN Chile", u:"https://rudo.video/live/cnnchile?ext=m3u8", i:"fa-globe"},
            {n:"Bio Bio TV", u:"https://rudo.video/live/bbtv?ext=m3u8", i:"fa-microphone"}
        ]
    };

    let curMode = "tv", curTitle = "", curEp = 1, curServ = "Vidsrc", curID = "", curLang = "lat";
    const video = document.getElementById('hls-player'), iframe = document.getElementById('embed-iframe'), panel = document.getElementById('ctrl-panel');
    let hls = new Hls();

    function tab(m, btn) {
        curMode = m;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(m + '-section').classList.add('active');
        btn.classList.add('active');
        panel.classList.remove('active');
        if(m==='tv') { iframe.style.display='none'; video.style.display='block'; }
        renderServers();
    }

    function renderServers() {
        const box = document.getElementById('srv-list'); box.innerHTML = "";
        const list = curMode === "anime" ? ["Vidsrc", "EmbedSu", "SuperE", "Netu"] : ["Vidsrc", "EmbedSu", "Cuevana", "SuperE", "VidHide"];
        list.forEach(s => {
            box.innerHTML += `<button class="btn-opt ${curServ===s?'active':''}" onclick="setServ('${s}')">${s}</button>`;
        });
        document.getElementById('cine-lang-box').style.display = curMode === "cine" ? "block" : "none";
        document.getElementById('anime-nav').style.display = curMode === "anime" ? "block" : "none";
    }

    function playTV(u) {
        iframe.style.display='none'; video.style.display='block';
        if(Hls.isSupported()){ 
            hls.destroy(); 
            hls = new Hls(); 
            hls.loadSource(u); 
            hls.attachMedia(video); 
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); 
        }
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function searchA() {
        const q = document.getElementById('a-search').value;
        const r = await fetch(`https://api.jikan.moe/v4/anime?q=${q}&limit=15`);
        const {data} = await r.json();
        const g = document.getElementById('grid-anime'); g.innerHTML = "";
        data.forEach(a => {
            g.innerHTML += `<div class="card poster-card" onclick="initMedia('${a.title}', 'anime')"><img src="${a.images.jpg.image_url}"><div class="poster-info">${a.title}</div></div>`;
        });
    }

    // --- CINE LOGIC ---
    async function searchC() {
        const q = document.getElementById('c-search').value;
        const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=ace288544d732899479e96e944733e8f&query=${q}&language=es-MX`);
        const {results} = await r.json();
        const g = document.getElementById('grid-cine'); g.innerHTML = "";
        results.forEach(m => {
            if(!m.poster_path) return;
            g.innerHTML += `<div class="card poster-card" onclick="initMedia('${m.title}', 'cine', '${m.id}')"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="poster-info">${m.title}</div></div>`;
        });
    }

    function initMedia(t, m, id) { 
        curTitle = t; curMode = m; curEp = 1; curID = id; 
        loadMedia(); 
    }

    function loadMedia() {
        video.style.display='none'; iframe.style.display='block'; panel.classList.add('active');
        document.getElementById('ep-display').innerText = "EPISODIO " + curEp;
        let slug = curTitle.toLowerCase().replace(/[^a-z0-9]+/g, "-");
        let url = "";

        if(curMode === 'anime') {
            // Anime: Japonés Subtitulado
            if(curServ === "Vidsrc") url = `https://vidsrc.me/embed/anime?last_name=${slug}&ep=${curEp}`;
            else if(curServ === "EmbedSu") url = `https://embed.su/embed/anime/${slug}/${curEp}`;
            else if(curServ === "SuperE") url = `https://multiembed.mov/?video_id=${slug}&s=${curEp}`;
            else url = `https://waaw.to/search.php?q=${slug}`;
        } else {
            // Cine: Multi-idioma
            if(curServ === "Vidsrc") url = `https://vidsrc.xyz/embed/movie?tmdb=${curID}`;
            else if(curServ === "EmbedSu") url = `https://embed.su/embed/movie/${curID}`;
            else if(curServ === "Cuevana") url = `https://api.cuevana.biz/embed/${curID}`;
            else if(curServ === "VidHide") url = `https://vidhide.com/v/${curID}`;
            else url = `https://multiembed.mov/?video_id=${curID}&tmdb=1`;
        }

        iframe.src = url;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function setServ(s) { curServ = s; renderServers(); loadMedia(); }
    function setLang(l, b) { 
        curLang = l; 
        document.querySelectorAll('.lang').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        loadMedia(); 
    }
    function chEp(v) { curEp += v; if(curEp<1) curEp=1; loadMedia(); }

    const drawGrid = (id, list) => {
        const g = document.getElementById(id);
        list.forEach(c => {
            g.innerHTML += `<div class="card" onclick="playTV('${c.u}')"><i class="fas ${c.i}"></i><span>${c.n}</span></div>`;
        });
    }
    
    drawGrid('grid-dep', tvData.dep);
    drawGrid('grid-chi', tvData.chi);
    drawGrid('grid-cab', tvData.cab);
    drawGrid('grid-not', tvData.not);

</script>
</body>
</html>
